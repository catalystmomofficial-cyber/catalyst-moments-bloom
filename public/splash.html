<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1008">
<title>Catalyst Mom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #1A1008;
    overflow: hidden;
  }

  .splash {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(181,101,29,0.15) 0%, transparent 68%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: glowBloom 2.6s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }
  @keyframes glowBloom {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    40%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0.8; }
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
  }
  .ring-1 { width: 220px; height: 220px; border: 1px solid rgba(181,101,29,0.3); animation: ringPulse 3s ease-out 1.2s infinite; }
  .ring-2 { width: 220px; height: 220px; border: 1px solid rgba(181,101,29,0.18); animation: ringPulse 3s ease-out 1.9s infinite; }
  .ring-3 { width: 220px; height: 220px; border: 1px solid rgba(181,101,29,0.1); animation: ringPulse 3s ease-out 2.6s infinite; }
  @keyframes ringPulse {
    0%   { transform: translate(-50%, -50%) scale(0.65); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
  }

  .logo-wrap {
    position: relative;
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    transform: scale(0.2) translateY(40px);
    opacity: 0;
    animation: logoReveal 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.15s forwards;
  }
  @keyframes logoReveal {
    0%   { transform: scale(0.2) translateY(40px); opacity: 0; }
    65%  { opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .logo-halo {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(181,101,29,0) 0%,
      rgba(200,120,42,0.9) 25%,
      rgba(244,197,160,0.6) 40%,
      rgba(181,101,29,0) 55%,
      rgba(139,69,19,0.7) 75%,
      rgba(181,101,29,0) 100%
    );
    animation: haloSpin 6s linear 1.3s infinite, haloFadeIn 1s ease 1.3s both;
    filter: blur(1px);
  }
  @keyframes haloSpin { to { transform: rotate(360deg); } }
  @keyframes haloFadeIn { from { opacity: 0; } to { opacity: 1; } }

  .logo-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid rgba(181,101,29,0.5);
    animation: haloFadeIn 1s ease 1.3s both;
  }

  .logo-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    z-index: 2;
    background: #1A1008;
    animation: breathe 4.5s ease-in-out 1.5s infinite;
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 20px rgba(181,101,29,0.3), 0 0 40px rgba(181,101,29,0.1); }
    50%      { box-shadow: 0 0 32px rgba(181,101,29,0.55), 0 0 60px rgba(181,101,29,0.2); }
  }

  .brand-block {
    margin-top: 36px;
    text-align: center;
    opacity: 0;
    transform: translateY(18px);
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
  }
  .brand {
    display: block;
    letter-spacing: 0.22em;
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(20px, 5vw, 28px);
    color: #E8B87A;
    text-transform: uppercase;
  }

  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin: 12px auto;
    opacity: 0;
    animation: fadeIn 0.6s ease 1.7s forwards;
  }
  .divider-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(181,101,29,0.7));
    animation: lineGrow 0.9s ease-out 1.8s forwards;
  }
  .divider-line.right { background: linear-gradient(90deg, rgba(181,101,29,0.7), transparent); }
  @keyframes lineGrow { to { width: 55px; } }
  .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(181,101,29,0.75); }

  .tagline {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(13px, 3.2vw, 16px);
    color: rgba(220,165,100,0.7);
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(10px);
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 2.0s forwards;
  }
  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  .loader {
    position: absolute; bottom: 56px;
    display: flex; gap: 8px;
    opacity: 0;
    animation: fadeIn 0.5s ease 2.6s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(181,101,29,0.35); }
  .dot:nth-child(1) { animation: dotPulse 1.3s ease-in-out 2.7s infinite; }
  .dot:nth-child(2) { animation: dotPulse 1.3s ease-in-out 2.95s infinite; }
  .dot:nth-child(3) { animation: dotPulse 1.3s ease-in-out 3.2s infinite; }
  @keyframes dotPulse {
    0%, 100% { background: rgba(181,101,29,0.2); transform: scale(1); }
    50%      { background: rgba(200,120,42,1); transform: scale(1.5); }
  }

  .noise {
    position: absolute; inset: 0; opacity: 0.025; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,3,0,0.72) 100%);
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="glow"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div class="logo-wrap">
      <div class="logo-halo"></div>
      <div class="logo-ring"></div>
      <div class="logo-circle">
        <img src="https://moxxceccaftkeuaowctw.supabase.co/storage/v1/object/public/catalystcourses/Logo/LOGO%20(3)%20(1).png" alt="Catalyst Mom" />
      </div>
    </div>

    <div class="brand-block">
      <span class="brand">Catalyst Mom</span>
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
        <span class="divider-line right"></span>
      </div>
      <span class="tagline">Bloom into motherhood</span>
    </div>

    <div class="loader">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="noise"></div>
    <div class="vignette"></div>
  </div>

  <script>
    setTimeout(() => { window.location.replace('/dashboard'); }, 3400);
  </script>
</body>
</html>
